<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rayhan Coelho - Durma Melhor</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1408 0%, #2a1f10 50%, #3a2f15 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0;
            margin: 0;
        }

        .container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-top: 24px;
            padding-bottom: 24px;
            max-width: 100%;
        }

        .social-header {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .social-link {
            width: 58px;
            height: 58px;
            border-radius: 16px;
            display: block;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(226, 130, 30, 0.4);
        }

        .social-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .social-link.instagram img { transform: scale(1.5); }
        .social-link.tiktok img { transform: scale(1.4); }
        .social-link.youtube img { transform: scale(1.05); }
        .social-link.linkedin img { transform: scale(1.05); }

        .social-link:active {
            transform: scale(0.88);
        }

        .profile {
            text-align: center;
            margin-bottom: 32px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 16px;
            box-shadow: 0 16px 40px rgba(226, 130, 30, 0.5);
            border: 5px solid rgba(255, 200, 50, 0.3);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .name {
            color: white;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .tagline {
            color: rgba(255, 220, 180, 0.85);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            line-height: 1.4;
            max-width: 300px;
            margin: 0 auto;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px 20px;
            text-decoration: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 15px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: none;
            cursor: pointer;
            width: 100%;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .link-button:active {
            transform: scale(0.94);
        }

        .icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .link-text {
            flex: 1;
            text-align: center;
        }

        .primary {
            background: linear-gradient(135deg, #c2691a 0%, #e8821e 50%, #a05518 100%);
            color: white;
            box-shadow: 0 16px 40px rgba(226, 130, 30, 0.5);
            border: 2px solid rgba(255, 200, 50, 0.25);
        }

        .primary .link-text {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: 14px;
        }

        .checklist-cta {
            background: rgba(34, 197, 94, 0.12);
            color: #4ade80;
            border: 1.5px solid rgba(34, 197, 94, 0.4);
            position: relative;
        }

        .checklist-cta:active {
            background: rgba(34, 197, 94, 0.18);
        }

        .checklist-cta .link-text {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: 14px;
        }

.secondary {
            background: rgba(255, 200, 50, 0.08);
            color: rgba(255, 220, 180, 0.9);
            border: 1.5px solid rgba(255, 200, 50, 0.2);
        }

        .secondary:active {
            background: rgba(255, 200, 50, 0.12);
        }

        .secondary .link-text {
            font-weight: 600;
            font-size: 14px;
        }

        @media (max-width: 360px) {
            .container { padding: 14px; }
            .link-button { padding: 20px 16px; gap: 10px; font-size: 14px; }
            .avatar { width: 108px; height: 108px; }
            .name { font-size: 26px; }
            .social-link { width: 54px; height: 54px; }
        }

        @media (max-height: 750px) {
            .container { padding: 12px; }
            .profile { margin-bottom: 20px; }
            .social-header { margin-bottom: 16px; }
            .link-button { padding: 18px 14px; font-size: 13px; }
            .avatar { width: 100px; height: 100px; margin-bottom: 12px; }
            .name { font-size: 24px; }
        }
    </style>
</head>
